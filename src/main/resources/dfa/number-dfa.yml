name: NumDfa
startState: q0
alphabet: [ZERO_DIGIT, NONZERO_DIGIT, DOT, E_LETTER, PLUS, MINUS]
types: [INTEGER, FLOAT]
acceptStates: [q1, q2, q4, q8, q9, q10]
trapStates: [qTrap1, qTrap2]

stateTypes:
  INTEGER: [q1, q2]
  FLOAT: [q3, q4, q5, q6, q7, q8, q9, q10]

transitions:
  q0:
    ZERO_DIGIT: q1
    NONZERO_DIGIT: q2

  q1:
    DOT: q3
    ZERO_DIGIT: qTrap1
    NONZERO_DIGIT: qTrap1

  q2:
    ZERO_DIGIT: q2
    NONZERO_DIGIT: q2
    DOT: q3

  q3:
    ZERO_DIGIT: q4
    NONZERO_DIGIT: q10

  q10:
    ZERO_DIGIT: q6
    NONZERO_DIGIT: q10
    E_LETTER: q5

  q4:
    ZERO_DIGIT: q6
    NONZERO_DIGIT: q4
    E_LETTER: q5

  q5:
    PLUS: q7
    MINUS: q7
    ZERO_DIGIT: q8
    NONZERO_DIGIT: q9

  q6:
    ZERO_DIGIT: q6
    NONZERO_DIGIT: q4

  q7:
    ZERO_DIGIT: q8
    NONZERO_DIGIT: q9

  q8:
    ZERO_DIGIT: qTrap2
    NONZERO_DIGIT: qTrap2

  q9:
    ZERO_DIGIT: q9
    NONZERO_DIGIT: q9

  qTrap1:
    DEFAULT: qTrap1

  qTrap2:
    DEFAULT: qTrap2
